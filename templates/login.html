<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vex People Predictive - Plataforma SaaS BPO</title>

    <!-- OpenGraph -->
    <meta property="og:title" content="Vex People Predictive">
    <meta property="og:description" content="Plataforma SaaS de entrenamiento y evaluacion predictiva del talento para operaciones BPO. Simulaciones con IA, perfiles de competencias multidimensionales, analytics en tiempo real y gestion multi-operativa. Desarrollado por VEX I+D / Voicenter.">
    <meta property="og:image" content="{{ url_for('static', filename='img/og-card.png', _external=True) }}">
    <meta property="og:url" content="{{ request.url }}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Vex People Predictive by Voicenter">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Vex People Predictive">
    <meta name="twitter:description" content="Plataforma SaaS de entrenamiento y evaluacion predictiva del talento para operaciones BPO.">
    <meta name="twitter:image" content="{{ url_for('static', filename='img/og-card.png', _external=True) }}">
    <meta name="description" content="Vex People Predictive - Plataforma SaaS de entrenamiento con IA y evaluacion predictiva para BPO y Contact Centers.">

    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <img src="{{ url_for('static', filename='img/logo-voicenter.png') }}" alt="Vex People Predictive" class="login-logo">
            <h1>Vex People Predictive</h1>
            <p class="login-subtitle">Iniciar sesion</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label for="email">Email o Usuario</label>
                    <input type="text" id="email" name="email" required placeholder="tu@email.com" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Contrasena</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Ingresar</button>
            </form>
        </div>
        <p class="login-footer">&copy; 2025 VEX I+D</p>
    </div>
</body>
</html>
